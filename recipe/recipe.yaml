context:
  version: "3.11.5"

package:
  name: dart-sdk
  version: ${{ version }}

source:
  - if: linux and x86_64
    then:
      url: https://storage.googleapis.com/dart-archive/channels/stable/release/${{ version }}/sdk/dartsdk-linux-x64-release.zip
      sha256: 57f3ab5ac24883060b1ff12bcdac472ed76563ec7364e88f8a6d41e4f0db075f
  - if: linux and aarch64
    then:
      url: https://storage.googleapis.com/dart-archive/channels/stable/release/${{ version }}/sdk/dartsdk-linux-arm64-release.zip
      sha256: 50e9aba58f8717943854778a73074e63a80c42054355d35e2732a0cc0824a2fb
  - if: win and x86_64
    then:
      url: https://storage.googleapis.com/dart-archive/channels/stable/release/${{ version }}/sdk/dartsdk-windows-x64-release.zip
      sha256: 044b9c58f45c7e8b67467395eaad469f67cd8797a73fbd1d2bb8a89a53b2dcba
  - if: osx and x86_64
    then:
      url: https://storage.googleapis.com/dart-archive/channels/stable/release/${{ version }}/sdk/dartsdk-macos-x64-release.zip
      sha256: 94de6a18049c354026f5422446b311cfc96b51db6d316eeb7ca46ff14c0b8aaa
  - if: osx and arm64
    then:
      url: https://storage.googleapis.com/dart-archive/channels/stable/release/${{ version }}/sdk/dartsdk-macos-arm64-release.zip
      sha256: 3fd03deb3b0c7897a9896c3f5f3dda4a9fe63c43b14364ee928ec6db348be0ac

build:
  number: 0
  skip:
    - ppc64le
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      # normal linux stuff that would go away if we had libgcc-ng in the run deps
      - "*/ld-linux.so.2"
      - "*/lib64/ld-linux-x86-64.so.2"
      - "*/libpthread.so.0"
      - "*/libdl.so.2"
      - "*/libm.so.6"
      - "*/libc.so.6"

tests:
  - package_contents:
      bin:
        - if: win
          then: dart.exe
  - script:
      - dart --help

about:
  homepage: https://dart.dev/
  license: BSD-3-Clause
  license_file: LICENSE
  summary: a client-optimized language for developing fast apps on any platform
  repository: https://github.com/dart-lang/sdk
  documentation: https://dart.dev/

extra:
  recipe-maintainers:
    - msarahan
    - munechika-koyo
